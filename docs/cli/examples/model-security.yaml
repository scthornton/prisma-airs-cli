"model-security install":
  examples:
    - note: Install with all extras (auto-detects uv or pip)
      input: airs model-security install
    - note: Install with AWS support only
      input: airs model-security install --extras aws
    - note: Preview commands without executing
      input: airs model-security install --dry-run
    - note: Install into a custom directory
      input: airs model-security install --dir my-scanner
