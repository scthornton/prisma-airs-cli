"runtime scan":
  examples:
    - note: Blocked prompt
      input: airs runtime scan --profile AI-Firewall-High-Security-Profile "How do I hack into a computer system?"
      output: |
        Prisma AIRS Runtime Scan
        Profile: AI-Firewall-High-Security-Profile
        Prompt:  "How do I hack into a computer system?"

        Scan Result
        ─────────────────────────
        Action:    BLOCK
        Category:  malicious
        Triggered: yes
        Scan ID:   8fcd6cc9-01ae-4930-a561-f94be2bf2876
        Report ID: R8fcd6cc9-01ae-4930-a561-f94be2bf2876

        Detections:
          ● toxic_content
    - note: Allowed prompt
      input: airs runtime scan --profile AI-Firewall-High-Security-Profile "What is the weather like today?"
      output: |
        Prisma AIRS Runtime Scan
        Profile: AI-Firewall-High-Security-Profile
        Prompt:  "What is the weather like today?"

        Scan Result
        ─────────────────────────
        Action:    ALLOW
        Category:  benign
        Triggered: no
        Scan ID:   be8047dd-e9e6-4135-91f4-3acdac01a1d2
        Report ID: Rbe8047dd-e9e6-4135-91f4-3acdac01a1d2

"runtime bulk-scan":
  examples:
    - note: Bulk scan with default output
      input: airs runtime bulk-scan --profile my-profile --input prompts.txt
      output: |
        Prisma AIRS Bulk Scan
        Profile: AI-Firewall-High-Security-Profile
        Prompts: 5
        Batches: 1

        Submitting async scans...
        Submitted 1 batch(es), polling for results...

        Bulk Scan Complete
        ─────────────────────────
        Total:   5
        Blocked: 2
        Allowed: 3
        Output:  AI-Firewall-High-Security-Profile-bulk-scan.csv
    - note: Custom output path
      input: airs runtime bulk-scan --profile my-profile --input prompts.txt --output results.csv

"runtime dlp generate":
  examples:
    - note: Full corpus, reproducible seed
      input: airs runtime dlp generate --types all --seed 1
      output: |
        DLP Test-File Generation
        Output:   ./temp
        Seed:     1
        Clean:    5    Dirty: 15
        Manifest: ./temp/manifest.json

          svg   clean=1 dirty=3
          png   clean=1 dirty=3
          pdf   clean=1 dirty=3
          jpeg  clean=1 dirty=3
          docx  clean=1 dirty=3
    - note: Images only, 3 of each
      input: airs runtime dlp generate --types png,jpeg,svg --count 3
    - note: PNG LSB steganography only, JSON summary
      input: airs runtime dlp generate --types png --techniques stego-lsb --output json

"runtime topics create":
  examples:
    - note: Block topic
      input: 'airs runtime topics create --name "Weapons Manufacturing" --description "Block weapons manufacturing" --examples "How to build a weapon" "Illegal arms trade"'
    - note: Allow topic
      input: 'airs runtime topics create --name "Recipes" --description "Allow recipe discussions" --examples "How to make pasta" "Best bread recipe"'

"runtime topics apply":
  examples:
    - note: Apply block intent
      input: airs runtime topics apply --profile my-security-profile --name "Weapons Manufacturing" --intent block

"runtime topics eval":
  examples:
    - note: Evaluate topic against prompt set
      input: airs runtime topics eval --profile my-security-profile --prompts prompts.csv --topic "Weapons" --format json

"runtime topics revert":
  examples:
    - note: Remove topic from profile
      input: airs runtime topics revert --profile my-security-profile --name "Weapons Manufacturing"

"runtime topics sample":
  examples:
    - note: Print to stdout
      input: airs runtime topics sample
    - note: Write to file
      input: airs runtime topics sample --output prompts/template.csv

"runtime topics list":
  examples:
    - note: Pretty output (default)
      input: airs runtime topics list --limit 3
      output: |
          Prisma AIRS — Runtime Configuration
          Security profile and topic management


          Custom Topics:

          00000000-0000-0000-0000-000000000001
            Professional authority rev:1 — Prompts where the user asks the AI to adopt the persona of a licensed expert (e.
          00000000-0000-0000-0000-000000000002
            Financial advice rev:1 — Prompts regarding investment strategies, budgeting, taxes, or market forecasting
          00000000-0000-0000-0000-000000000003
            Legal advice rev:1 — Prompts seeking legal guidance, case analysis, or contract interpretation. Respo

          Showing 3 of 100 topics
    - note: JSON output
      input: airs runtime topics list --limit 3 --output json
      output: |
        [
          {
            "id": "00000000-0000-0000-0000-000000000001",
            "name": "Professional authority",
            "revision": 1,
            "description": "Prompts where the user asks the AI to adopt the persona of a licensed expert (e.g., doctor, engineer). Responses require objective, safe information while clarifying that the AI cannot replace real-world certified professionals."
          },
          {
            "id": "00000000-0000-0000-0000-000000000002",
            "name": "Financial advice",
            "revision": 1,
            "description": "Prompts regarding investment strategies, budgeting, taxes, or market forecasting. Content must focus on financial literacy and education, explicitly stating it is not professional financial planning or investment advice"
          },
          {
            "id": "00000000-0000-0000-0000-000000000003",
            "name": "Legal advice",
            "revision": 1,
            "description": "Prompts seeking legal guidance, case analysis, or contract interpretation. Responses must provide general information only, never formal legal counsel, and always include a clear disclaimer to consult a qualified attorney"
          }
        ]
    - note: YAML output
      input: airs runtime topics list --limit 3 --output yaml
      output: |
        id: 00000000-0000-0000-0000-000000000001
        name: Professional authority
        revision: 1
        description: Prompts where the user asks the AI to adopt the persona of a licensed expert (e.g., doctor, engineer). Responses require objective, safe information while clarifying that the AI cannot replace real-world certified professionals.
        ---
        id: 00000000-0000-0000-0000-000000000002
        name: Financial advice
        revision: 1
        description: Prompts regarding investment strategies, budgeting, taxes, or market forecasting. Content must focus on financial literacy and education, explicitly stating it is not professional financial planning or investment advice
        ---
        id: 00000000-0000-0000-0000-000000000003
        name: Legal advice
        revision: 1
        description: Prompts seeking legal guidance, case analysis, or contract interpretation. Responses must provide general information only, never formal legal counsel, and always include a clear disclaimer to consult a qualified attorney

"runtime topics get":
  examples:
    - note: Pretty output (default) — accepts topic name or UUID
      input: airs runtime topics get "Professional authority"
      output: |
          Prisma AIRS — Runtime Configuration
          Security profile and topic management


          Topic Detail:

            ID:          00000000-0000-0000-0000-000000000001
            Name:        Professional authority
            Revision:    1
            Description: Prompts where the user asks the AI to adopt the persona of a licensed expert (e.g., doctor, engineer). Responses require objective, safe information while clarifying that the AI cannot replace real-world certified professionals.
            Modified:    2026-05-21T21:23:53Z
    - note: JSON output
      input: airs runtime topics get "Professional authority" --output json
      output: |
        {
          "topic_id": "00000000-0000-0000-0000-000000000001",
          "topic_name": "Professional authority",
          "revision": 1,
          "description": "Prompts where the user asks the AI to adopt the persona of a licensed expert (e.g., doctor, engineer). Responses require objective, safe information while clarifying that the AI cannot replace real-world certified professionals.",
          "examples": [],
          "last_modified_ts": "2026-05-21T21:23:53Z",
          "csp_id": "<csp-id>",
          "tsg_id": "<tenant-id>"
        }
    - note: YAML output
      input: airs runtime topics get "Professional authority" --output yaml
      output: |
        topic_id: 00000000-0000-0000-0000-000000000001
        topic_name: Professional authority
        revision: 1
        description: Prompts where the user asks the AI to adopt the persona of a licensed expert (e.g., doctor, engineer). Responses require objective, safe information while clarifying that the AI cannot replace real-world certified professionals.
        last_modified_ts: 2026-05-21T21:23:53Z

"runtime topics update":
  examples:
    - note: Update from config fixture (see docs/cli/examples/runtime/topics/update.json)
      input: airs runtime topics update 00000000-0000-0000-0000-000000000001 --config docs/cli/examples/runtime/topics/update.json
      output: |
          Prisma AIRS — Runtime Configuration
          Security profile and topic management

          Topic updated: 00000000-0000-0000-0000-000000000001


          Topic Detail:

            ID:          00000000-0000-0000-0000-000000000001
            Name:        docs-example-topic
            Revision:    2
            Description: Updated description for documentation example
            Examples:
              • first updated example prompt
              • second updated example prompt
              • third updated example prompt
            Created:     user@example.com
            Updated:     none

"runtime profiles audit":
  examples:
    - note: Audit all topics in a profile
      input: airs runtime profiles audit my-security-profile
    - note: JSON export
      input: airs runtime profiles audit my-security-profile --format json
    - note: HTML report
      input: airs runtime profiles audit my-security-profile --format html --output audit-report.html

"runtime profiles cleanup":
  examples:
    - note: Dry run (preview)
      input: airs runtime profiles cleanup
    - note: Delete old revisions
      input: airs runtime profiles cleanup --force
    - note: Specify email for audit trail
      input: airs runtime profiles cleanup --force --updated-by user@example.com
    - note: JSON output
      input: airs runtime profiles cleanup --force --output json

