"redteam scan":
  examples:
    - note: Static scan with all categories
      input: airs redteam scan --target <uuid> --name "Full Scan"
    - note: Custom scan with prompt sets
      input: airs redteam scan --target <uuid> --name "Topic Validation" --type CUSTOM --prompt-sets <uuid1>,<uuid2>
    - note: Dynamic scan with goals file
      input: airs redteam scan --target <uuid> --name "Agent Scan" --type DYNAMIC --goals goals.json --depth 10 --breadth 6

