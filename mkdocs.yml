site_name: Prisma AIRS CLI
site_url: https://cdot65.github.io/prisma-airs-cli/
site_description: CLI and library for Palo Alto Prisma AIRS — guardrail refinement, AI red teaming, model security scanning, profile audits
repo_name: cdot65/prisma-airs-cli
repo_url: https://github.com/cdot65/prisma-airs-cli

theme:
  name: material
  logo: images/logo.svg
  favicon: images/favicon.ico
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Quick Start: getting-started/quick-start.md
  - Runtime Security:
      - Overview: runtime/overview.md
      - Prompt Scanning: runtime/scanning.md
      - DLP Test-File Generation: runtime/dlp-gen.md
      - Configuration Management: runtime/config-management.md
      - Guardrail Optimization:
          - How It Works: runtime/guardrails/overview.md
          - Generate & Evaluate: runtime/guardrails/generate-and-evaluate.md
          - Metrics & Evaluation: runtime/guardrails/metrics.md
          - Topic Constraints: runtime/guardrails/topic-constraints.md
      - Profile Audits: runtime/profile-audits.md
  - AI Red Teaming:
      - Overview: redteam/overview.md
      - Running Scans: redteam/scanning.md
      - Managing Targets: redteam/targets.md
      - EULA & Infrastructure: redteam/infrastructure.md
      - Prompt Sets & Prompts: redteam/prompt-sets.md
      - Guardrail to Red Team: redteam/guardrail-to-redteam.md
  - DLP Detection Testing:
      - Overview: dlp-detection/index.md
      - Test File Catalog: dlp-detection/catalog.md
      - "Finding: SVG DLP Bypass": dlp-detection/svg-dlp-bypass.md
  - Backup & Restore:
      - Overview: backup/overview.md
  - Model Security:
      - Overview: model-security/overview.md
      - Security Groups: model-security/groups.md
      - Rules & Instances: model-security/rules.md
      - Scans & Results: model-security/scans.md
      - Labels: model-security/labels.md
      - Python SDK: model-security/install.md
  - Reference:
      - Architecture:
          - Overview: architecture/overview.md
          - Guardrail Optimization: architecture/core-loop.md
          - Design Decisions: architecture/design-decisions.md
      - LLM Providers:
          - Overview: providers/overview.md
          - SaaS APIs: providers/saas-apis.md
          - Vertex AI: providers/vertex-ai.md
          - AWS Bedrock: providers/bedrock.md
          - Troubleshooting: providers/troubleshooting.md
      - CLI Commands: reference/cli-commands.md
      - Configuration Options: reference/configuration.md
      - Environment Variables: reference/environment-variables.md
      - AIRS Constraints: reference/airs-constraints.md
      - AI Agent Instructions: reference/agent-instructions.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Live Smoke Tests: development/smoke-tests.md
      - Full CLI Command Sweep: development/full-cli-sweep.md
      - Local Setup: development/local-setup.md
  - About:
      - Release Notes: about/release-notes.md
      - License: about/license.md
